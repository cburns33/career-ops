<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase Burns — Cover Letter</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    line-height: 1.7;
    color: #1a1a2e;
    background: #ffffff;
  }
  .page { width: 100%; max-width: 760px; margin: 0 auto; padding: 2px 0; }
  .header { margin-bottom: 28px; }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.1;
  }
  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 10px;
  }
  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-size: 10.5px;
    color: #555;
  }
  .contact-row a { color: #555; text-decoration: none; }
  .contact-row .separator { color: #ccc; }
  .letter-meta { margin-bottom: 24px; }
  .letter-date { font-size: 11px; color: #777; margin-bottom: 16px; }
  .letter-recipient { font-size: 11px; color: #333; line-height: 1.6; }
  .letter-recipient .company {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    color: hsl(270, 70%, 45%);
    font-size: 11.5px;
  }
  .letter-subject {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12.5px;
    font-weight: 700;
    color: hsl(187, 74%, 32%);
    margin-bottom: 20px;
    padding-bottom: 6px;
    border-bottom: 1.5px solid #e2e2e2;
  }
  .letter-body p { font-size: 11.5px; line-height: 1.8; color: #2f2f2f; margin-bottom: 16px; }
  .letter-closing { margin-top: 28px; font-size: 11.5px; color: #2f2f2f; line-height: 1.8; }
  .letter-closing .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #1a1a2e;
    margin-top: 4px;
  }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER — static -->
  <div class="header">
    <h1>Chase Burns</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>+1 (281) 467-4828</span>
      <span class="separator">|</span>
      <span>chase.burns33@gmail.com</span>
      <span class="separator">|</span>
      <a href="https://linkedin.com/in/chase-burns">linkedin.com/in/chase-burns</a>
      <span class="separator">|</span>
      <span>Austin, TX</span>
    </div>
  </div>

  <!-- DATE + RECIPIENT — variable -->
  <div class="letter-meta">
    <div class="letter-date">{{DATE}}</div>
    <div class="letter-recipient">
      Hiring Team<br>
      <span class="company">{{COMPANY}}</span>
    </div>
  </div>

  <!-- SUBJECT — variable -->
  <div class="letter-subject">Re: {{ROLE}}</div>

  <!-- BODY — variable -->
  <div class="letter-body">
    <p>{{OPENING}}</p>
    <p>{{BODY_1}}</p>
    <p>{{BODY_2}}</p>
  </div>

  <!-- CLOSING — static -->
  <div class="letter-closing">
    Sincerely,<br>
    <div class="name">Chase Burns</div>
  </div>

</div>
</body>
</html>
