    - "Nashville"
    - "Atlanta"
    - "Dallas"
    - "Houston"
    - "Phoenix"
    - "Philadelphia"
    - "Washington DC"
    - "Minneapolis"
    - "Charlotte"
    - "Tampa"
    - "Orlando"
    
  commute_radius:
    austin: "10 miles from 78723"
