# -- Search queries --
# [CUSTOMIZE] Adjust for your preferred job boards and locations

search_queries:
  # Remote-first job boards
  - board: "We Work Remotely"
    query: "marketing manager remote"
    url: "https://weworkremotely.com/remote-jobs"
    
  - board: "Remote OK"
    query: "digital marketing"
    url: "https://remoteok.io/remote-marketing-jobs"
    
  - board: "Built In"
    query: "digital marketing manager austin"
    url: "https://www.builtinaustin.com/jobs"
    
  - board: "LinkedIn"
    query: "\"digital marketing manager\" remote"
    url: "https://www.linkedin.com/jobs/search"
    
  - board: "Indeed"
    query: "\"paid media manager\" remote"
    url: "https://www.indeed.com/jobs"
    
  - board: "AngelList"
    query: "marketing manager"
    url: "https://angel.co/jobs"
    
  # Austin-specific searches
  - board: "Built In Austin"
    query: "\"digital marketing\" austin"
    url: "https://www.builtinaustin.com/jobs"
    
  - board: "Austin Tech Jobs"
    query: "marketing manager"
    url: "https://austintechjobs.com"

